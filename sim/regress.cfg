# Regression Configuration for Fusion IP UVM Testbench
# Format: testcase_name , run_times=N , run_opts=+plusargs ;
# 
# parse rules:
# - Each tc must end with `;`
# - Fields separated by `,`
# - run_times: number of iterations (each with random seed if not specified)
# - run_opts: plusargs joined by `+` (converted to spaces by script)
#

# =====================================================================
# Pass/Fail Keywords (for log parsing)
# =====================================================================

pass_key_word = "PASS - TEST COMPLETED WITHOUT ERRORS";
fail_key_word = "FAILED|ERROR|TIMEOUT|FATAL";

# =====================================================================
# Test Case List
# =====================================================================

tc_list {
    
    # T1: Sanity Test - Single UKF cycle
    # Run once with fixed seed to catch basic regressions
    fusion_sanity_test , run_times=1 , run_opts= ;
    
    # T2: Multi-Cycle Test - 5 UKF cycles in sequence
    # Run 2 times with different seeds for variability
    fusion_multi_cycle_test , run_times=2 , run_opts= ;
    
    # T3: Missing GPS Test - Filter operation without GPS
    # Run once to verify handle of missing sensor
    fusion_missing_gps_test , run_times=1 , run_opts= ;
    
    # T4: Interrupt and Clear Test
    # Run once to verify interrupt signaling
    fusion_irq_status_test , run_times=1 , run_opts= ;
    
    # T5: Soft Reset Test
    # Run once to verify reset mechanism
    fusion_soft_reset_test , run_times=1 , run_opts= ;
    
    # T6: RAL Bit Bash - Register access patterns
    # Run 3 times with random seeds for bus protocol robustness
    fusion_ral_bit_bash_test , run_times=3 , run_opts= ;
    
    # T7: Scoreboard Reference Test - Output vs Predictor
    # Run 2 times to verify prediction accuracy
    fusion_scoreboard_ref_test , run_times=2 , run_opts= ;
    
    # T8: CSV Route Test (placeholder - not yet fully implemented)
    # fusion_csv_route_test , run_times=1 , run_opts=+csv_file+route.csv ;
};

# =====================================================================
# Regression Options
# =====================================================================

