[Library]
others = /opt/questasim/questasim_10.8b/modelsim_src/modelsim.ini

work = ./work

[vsim]
; If you want to run this simulation via the simulator GUI, uncomment this line
;gui = 1

; Simulator resolution
resolution = 1ps

; User time unit for $realtime
; example: -timescale=1ns
UserTimeUnit = 1ns

; Default run length
RunLength = 100 ms

; Maximum iterations that will be run before the simulator exits
IterationLimit = 5000

; Simulation mode. 0 = batch, 1 = interactive
Mode = batch

; Increment between component opens. Closes all but increment last
; StructuralCascadingOnClose = 0

; Limit for close increment generations
; MaxStructuralCascadingCloses = 0

; Number of Verilog tasks that stack up before cleanup
; TaskStackSize = 10000

; Stack page size
; StackPageSize = 10000

; Module/task call stack cannot exceed this depth
StackSize = 524288

; Uncomment this if you want to stop on assertion failures
; StopOnAssertion = 1

; Ignore assertion failures during MPL gating of common signals
; IgnoreAssertionFailures = 1

; Set the following to hardcode a breakpoint on errors
; BreakOnError = 1

; Treat all backslashes as escape characters when in Verilog strings
; BackslashCharacterAsEscape = 1

; Treat all single quotes in Verilog strings as delimiters
; SingleQuoteDelimiter = 1

; For VHDL or Verilog, turn off optimizations on pragmas that specify the same
; OptimizePragmas = 0

; Verilog simulation mode (verilog or systemverilog)
; VerilogVersion = verilog

; Turn on PSL for safety property checking. Checks all assertions from
; SystemVerilog SVA.
; PSL = 1

; Select the simulation language to be used
; The default is systemverilog.
; VerilogVersion = systemverilog

; Turn on language extensions for compatibility with other Verilog simulators
; Language = plus

; Turn on/off optimizations; default is on
; Optimize = 0

; Default file type for savestate
; SaveStateFileType = binary

; Turn on automatic savestate
; AutoSaveState = 1

; Savestate file
; SaveStateFile = ./savestate

; Source do files in order
; SourceDoFilesInOrder = 1

; Specify whether uninitialized memories in Verilog designs are shown as
; all zero, X, or random data during simulation. Default is X.
; UninitialisedMem = 0

; Specify the number of source files to list during coverage file list dialog
; SourceFileListSize = 20

; Specify the unique instance count to be used for per-instance coverage reports
; UniqInstanceCoverage = 0

; Turn on code coverage for FSM StateVar and CoverageDeductiveRels item types.
; CoverageCombinatorial = 0

; Specify language for do files
; ScriptingLanguage = tcl

; Disable VHDL assert failures
; IgnoreNote = 1
; IgnoreWarning = 1
; IgnoreFailure = 0

; Default GTKWave executable and arguments
; GTKWaveExePath = gtkwave
; GTKWaveExeArgs = 

; Specify true to check the license file for Vicor component licenses
; CheckVicorCmpLic = 0

; Specify number of simulator iterations between license checks
; CheckLicenseInterval = 0

; Set this variable to specify a custom waveform viewer
; WaveformViewer = 

; Specify whether to close the waveform viewer when the simulator exits
; CloseWaveformViewerOnStop = 1

; Turn on command line editing when running interactively
; CommandLineEditing = 1

; Turn on VHDL assert warnings
; VhdlAssertAsWarning = 0

; Ignore VHDL assert statement failures - treat as notes not errors
; VhdlAssertAsNote = 0

[vcom]
; Suppress messages about trailing whitespace
; SuppressWarnings = 3

; Show source line containing error. Default is 1
; ShowSource = 1

; Turn off warning message and ignore VHDL rules 1647, 1481, and 1000
; IgnoreStd = 1

; Turn off Info messages
; SuppressInfo = 1

; Turn off Warning messages
; SuppressWarnings = 1

; Turn off Error messages
; SuppressErrors = 1

; Turn off Note messages  
; SuppressNotes = 1

[vlog]
; Turn off Info messages
; SuppressInfo = 1

; Turn off Warning messages
; SuppressWarnings = 1

; Turn off Error messages
; SuppressErrors = 1

; Turn off Note messages
; SuppressNotes = 1

; Increase the message line limit to 120 characters. Default is 79.
MessageLimit = 120

; Turn off assertion control system warnings
; IgnoreSystemVerilogAssertions = 1

[asim]
; Disable warning about missing scope specifications
; DisableMissingScope = 1

; Disable warning about missing architecture specifications
; DisableMissingArchitecture = 1

[Project]
; PROJECT_VERSION=2.1

; Default project name
;ProjectSublevel1 = 

; EDA tool to invoke for EDA_TOOL_<name>
;EDA_TOOL_DESIGNCOMPILER=
;EDA_TOOL_FORMALITY=
;EDA_TOOL_PRECISION=

[msg_system]
; Change a message severity or suppress a message.
; The format is: <msg directive> = <severity>, <msg id | msg string>

; Examples:
;   note = 3024
;   warning = 12110
;   error = 1234
;   fatal = 1234
;   suppress = 1234

